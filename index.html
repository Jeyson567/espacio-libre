<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Caja de Cobro USD</title>

<style>
body{
font-family: Arial;
background:#f2f2f2;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.caja{
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
width:300px;
text-align:center;
}

input{
width:100%;
padding:10px;
margin:10px 0;
font-size:16px;
}

button{
background:#28a745;
color:white;
border:none;
padding:10px;
width:100%;
font-size:16px;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#218838;
}

.resultado{
margin-top:15px;
font-weight:bold;
}
</style>
</head>

<body>

<div class="caja">

<h2>Caja USD</h2>

<label>Total a pagar ($)</label>
<input type="number" id="total">

<label>Cliente paga ($)</label>
<input type="number" id="pago">

<button onclick="calcular()">Calcular Vuelto</button>

<div class="resultado" id="resultado"></div>

</div>

<script>

const tasa = 6;

function calcular(){

let total = parseFloat(document.getElementById("total").value);
let pago = parseFloat(document.getElementById("pago").value);

if(pago < total){
document.getElementById("resultado").innerHTML = "Pago insuficiente";
return;
}

let vueltoUSD = pago - total;
let vueltoGTQ = vueltoUSD * tasa;

document.getElementById("resultado").innerHTML =
"Vuelto: $" + vueltoUSD.toFixed(2) +
"<br>" +
"Equivale a: Q" + vueltoGTQ.toFixed(2);

}

</script>

</body>
</html>
