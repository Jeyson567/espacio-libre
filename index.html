<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Caja Restaurante / Hotel</title>

<style>

body{
font-family: Arial;
background:#111;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.caja{
background:#1e1e1e;
padding:30px;
border-radius:10px;
width:350px;
box-shadow:0 0 20px rgba(0,0,0,0.6);
}

h2{
text-align:center;
}

input{
width:100%;
padding:12px;
margin-top:10px;
font-size:16px;
border:none;
border-radius:5px;
}

button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
background:#00c853;
color:white;
font-size:16px;
border-radius:5px;
cursor:pointer;
}

.resultado{
margin-top:15px;
font-size:18px;
}

</style>

</head>

<body>

<div class="caja">

<h2>Caja USD → Q</h2>

<p>Cambio usado: <b>1 USD = Q6</b></p>

<label>Total de la cuenta (Quetzales)</label>
<input type="number" id="total">

<label>Dólares que paga el cliente</label>
<input type="number" id="dolares">

<button onclick="calcular()">Calcular Vuelto</button>

<div class="resultado" id="resultado"></div>

</div>

<script>

let tasa = 6;

function calcular(){

let total = parseFloat(document.getElementById("total").value);
let dolares = parseFloat(document.getElementById("dolares").value);

let pagoQuetzales = dolares * tasa;
let vuelto = pagoQuetzales - total;

let texto = "";

texto += "Pago en quetzales: Q" + pagoQuetzales.toFixed(2) + "<br>";

if(vuelto >= 0){
texto += "Vuelto a dar: Q" + vuelto.toFixed(2);
}else{
texto += "Faltan: Q" + Math.abs(vuelto).toFixed(2);
}

document.getElementById("resultado").innerHTML = texto;

}

</script>

</body>
</html>
